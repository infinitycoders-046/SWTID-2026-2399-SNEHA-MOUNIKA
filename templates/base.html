<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heritage Treasures - UNESCO World Heritage Analysis</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animated"></div>
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>

    <!-- Include Navbar -->
    {% include 'navbar.html' %}

    <!-- Main Content -->
    <main class="container py-5 mt-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer-glass">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <span class="brand-grad fs-5 fw-bold">Heritage Treasures</span>
                    <p class="small mt-1 mb-0 opacity-50">
                        <i class="bi bi-globe2 me-1"></i> UNESCO World Heritage · Tableau Analysis
                    </p>
                </div>
                <div class="col-md-6 text-md-end">
                    <a href="#" class="me-3 social-icon"><i class="bi bi-twitter-x"></i></a>
                    <a href="#" class="me-3 social-icon"><i class="bi bi-linkedin"></i></a>
                    <a href="#" class="me-3 social-icon"><i class="bi bi-github"></i></a>
                    <a href="#" class="social-icon"><i class="bi bi-youtube"></i></a>
                </div>
            </div>
            <div class="border-top border-white border-opacity-10 mt-3 pt-3 small d-flex justify-content-between align-items-center">
                <span>© 2026 Heritage Treasures · All rights reserved</span>
                <span>
                    <i class="bi bi-pin-map-fill me-1" style="color: #6C3BFF;"></i>
                    Built with Flask & Bootstrap
                </span>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
