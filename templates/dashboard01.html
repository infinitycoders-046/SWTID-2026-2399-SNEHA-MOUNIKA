<script type="text/javascript">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Fetch and render all charts
        async function loadCategoryChart() {
            const response = await fetch('/api/category_distribution');
            const data = await response.json();
            const ctx = document.getElementById('categoryChart').getContext('2d');
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        data: Object.values(data),
                        backgroundColor: ['#FF6B6B', '#4ECDC4', '#FFE66D'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        async function loadRegionChart() {
            const response = await fetch('/api/region_distribution');
            const data = await response.json();
            const ctx = document.getElementById('regionChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        data: Object.values(data),
                        backgroundColor: ['#FF9F1C', '#2EC4B6', '#E71D36', '#9C89B8', '#F0A6CA', '#B8F2E6'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        async function loadTimelineChart() {
            const response = await fetch('/api/inscription_timeline');
            const data = await response.json();
            const years = Object.keys(data).sort();
            const counts = years.map(year => data[year]);
            const ctx = document.getElementById('timelineChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: years,
                    datasets: [{
                        label: 'Sites Inscribed',
                        data: counts,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'top' }
                    },
                    scales: {
                        y: { beginAtZero: true, title: { display: true, text: 'Number of Sites' } },
                        x: { title: { display: true, text: 'Year' } }
                    }
                }
            });
        }

        async function loadTopCountriesChart() {
            const response = await fetch('/api/top_countries');
            const data = await response.json();
            const ctx = document.getElementById('topCountriesChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        label: 'Number of Heritage Sites',
                        data: Object.values(data),
                        backgroundColor: 'rgba(102, 126, 234, 0.7)',
                        borderRadius: 10
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'top' }
                    },
                    scales: {
                        y: { beginAtZero: true, title: { display: true, text: 'Number of Sites' } }
                    }
                }
            });
        }

        async function loadEndangeredChart() {
            const response = await fetch('/api/endangered_sites');
            const data = await response.json();
            const regionCounts = {};
            data.forEach(site => {
                regionCounts[site.region] = (regionCounts[site.region] || 0) + 1;
            });
            const ctx = document.getElementById('endangeredChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(regionCounts),
                    datasets: [{
                        label: 'Endangered Sites',
                        data: Object.values(regionCounts),
                        backgroundColor: '#E71D36',
                        borderRadius: 10
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'top' }
                    },
                    scales: {
                        y: { beginAtZero: true, title: { display: true, text: 'Number of Endangered Sites' } }
                    }
                }
            });
        }

        // Load all charts
        loadCategoryChart();
        loadRegionChart();
        loadTimelineChart();
        loadTopCountriesChart();
        loadEndangeredChart();
    </script>
